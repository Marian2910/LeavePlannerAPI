name: SonarQube

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build and analyze
    runs-on: windows-latest

    steps:
      # ---------- JAVA ----------
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'

      # ---------- CHECKOUT ----------
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ---------- CACHE ----------
      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~\sonar\cache
          key: ${{ runner.os }}-sonar

      - name: Cache SonarScanner
        id: cache-sonar-scanner
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}\scanner
          key: ${{ runner.os }}-sonar-scanner

      # ---------- INSTALL SCANNER ----------
      - name: Install SonarScanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          New-Item -Path ${{ runner.temp }}\scanner -ItemType Directory -Force
          dotnet tool install dotnet-sonarscanner --tool-path ${{ runner.temp }}\scanner

      # ---------- ANALYSIS ----------
      - name: Build, Test and Analyze
        shell: powershell
        run: |
          $scanner = "${{ runner.temp }}\scanner\dotnet-sonarscanner"

          # BEGIN
          & $scanner begin `
            /k:"Marian2910_LeavePlannerAPI" `
            /o:"marian2910" `
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}" `
            /d:sonar.host.url="https://sonarcloud.io" `
            /d:sonar.cs.cobertura.reportsPaths="coverage.xml"

          # BUILD (FIXED PATH)
          dotnet build WebApplication1/ProjectBackend.sln --no-incremental

          # TEST (WITH COVERAGE)
          dotnet test WebApplication1/ProjectBackend.sln `
            --collect:"XPlat Code Coverage" `
            --results-directory TestResults

          # COPY COVERAGE (FIXED)
          $coverage = Get-ChildItem -Recurse -Filter coverage.cobertura.xml | Select-Object -First 1
          Copy-Item $coverage.FullName coverage.xml

          # END
          & $scanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
